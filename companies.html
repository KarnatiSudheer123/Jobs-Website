<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Companies — CareerNest</title>
<meta name="description" content="Discover top companies hiring on CareerNest."/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responive.css">
</head>
<body>
<header class="nav-wrap">
  <nav class="nav glass">
    <a href="index.html" class="brand"><span class="brand-mark">◆</span><span>CareerNest</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="jobs.html">Jobs</a></li>
      <li><a href="companies.html" class="active">Companies</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div class="nav-actions">
      <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
      <a href="dashboard.html" class="btn btn-primary">Sign In</a>
      <button id="hamburger" class="icon-btn hamburger" aria-label="Menu">☰</button>
    </div>
  </nav>
</header>
<section class="page-head">
  <div class="container">
    <h1>Featured Companies</h1>
    <p class="lead">Discover great places to work, hand-picked for you.</p>
    <input id="companySearch" class="company-search" type="text" placeholder="Search companies..."/>
  </div>
</section>
<section class="container section">
  <div id="companiesGrid" class="company-grid big"></div>
</section>
<footer class="footer">
  <div class="container foot-inner">
    <div><span class="brand-mark">◆</span> CareerNest © 2026</div>
    <div class="foot-links">
      <a href="jobs.html">Jobs</a><a href="companies.html">Companies</a><a href="dashboard.html">Dashboard</a>
    </div>
  </div>
</footer>
<button id="toTop" class="to-top" aria-label="Back to top">↑</button>
<script src="js/app.js"></script>
<script src="js/jobs.js"></script>
<script>
  const grid = document.getElementById('companiesGrid');
  function renderCompanies(list){
    grid.innerHTML = list.map(c => `
      <a href="jobs.html?company=${encodeURIComponent(c.name)}" class="company glass reveal">
        <div class="logo" style="background:${c.color}">${c.name[0]}</div>
        <strong>${c.name}</strong>
        <small>${c.industry} · ${c.location}</small>
        <p class="muted">${c.about}</p>
        <div class="rating">★ ${c.rating} · ${c.openings} openings</div>
      </a>
    `).join('');
    initReveal();
  }
  renderCompanies(COMPANIES);
  document.getElementById('companySearch').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderCompanies(COMPANIES.filter(c => c.name.toLowerCase().includes(q) || c.industry.toLowerCase().includes(q)));
  });
</script>
</body>
</html>
